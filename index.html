<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>복층 원룸 3D 뷰어 v4</title>
<style>
  body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #b0d0e8; }
  #info {
    position: absolute; top: 12px; left: 12px; color: white;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; z-index: 10; line-height: 1.55;
    backdrop-filter: blur(6px); max-width: 320px;
  }
  #controls {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.55); padding: 10px; border-radius: 8px;
    z-index: 10; backdrop-filter: blur(6px);
  }
  button {
    background: #555; color: white; border: 1px solid #777;
    padding: 6px 12px; margin: 2px; border-radius: 5px; cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #777; }
  button.active { background: #2a7; border-color: #4d9; }
  small { opacity: .7; }
  .lil-gui { --width: 320px; }
  #dumpPanel {
    display: none; position: fixed; top: 60px; left: 50%;
    transform: translateX(-50%); z-index: 100;
    background: rgba(20,20,20,0.95); border: 1px solid #666;
    border-radius: 8px; padding: 14px; width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #dumpPanel h3 { color: white; margin: 0 0 8px 0; font-size: 14px; }
  #dumpText {
    width: 100%; height: 320px; box-sizing: border-box;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 11px; background: #111; color: #ddd;
    border: 1px solid #444; border-radius: 4px; padding: 8px;
    resize: vertical;
  }
  #dumpPanel .row { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
  #dumpStatus { color: #4d9; font-size: 11px; margin-right: auto; align-self: center; }
</style>
</head>
<body>
<div id="info">
  <strong>복층 원룸 3D v4</strong><br>
  <small>우측 패널에서 치수 조정 가능</small><br>
  좌클릭+드래그: 회전 / 휠: 확대 / 우클릭+드래그: 이동
</div>
<div id="controls">
  <button onclick="setView('iso')">아이소</button>
  <button onclick="setView('top')">위에서</button>
  <button onclick="setView('front')">정면(창)</button>
  <button onclick="setView('back')">뒤(현관)</button>
  <button onclick="setView('inside')">실내</button>
</div>
<div id="dumpPanel">
  <h3>📋 파라미터 JSON</h3>
  <textarea id="dumpText" spellcheck="false"></textarea>
  <div class="row">
    <span id="dumpStatus"></span>
    <button onclick="copyDump()">📋 복사</button>
    <button onclick="applyDump()">✅ 이 값으로 적용</button>
    <button onclick="closeDump()">닫기</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'lil-gui';

// ====== Params (모두 슬라이더로 조정 가능) ======
const params = {
  // 외형
  W: 3.30, L: 5.62, H1: 2.00, H_LOFT: 0.90,
  // 현관
  ent_x1: 0.55, ent_x2: 1.45,
  // 욕실 (back-right 영역)
  bath_x1: 1.55, bath_x2: 3.30,
  bath_z1: 0.00, bath_z2: 1.53,
  bath_door_z1: 0.30, bath_door_z2: 1.10,
  // 좌측 벽 = 북측옷장 + 부엌 + 남측옷장 (depth 공통)
  wd_left_north_z1: 0.00, wd_left_north_z2: 0.70,
  kit_z1: 0.70,           kit_z2: 1.87,
  wd_left_south_z1: 1.87, wd_left_south_z2: 4.15,
  kit_depth: 0.55,
  // 계단 (NS along east wall, 기본)
  stair_dir: 'NS',                             // 'NS' | 'EW'
  stair_x1: 2.80, stair_x2: 3.30,              // x range
  stair_z_top: 1.53, stair_z_bot: 4.23,        // NS 모드: top z (loft side) ~ bottom z
  stair_steps: 10,
  // 복층
  loft_z2: 4.15,
  // 창 (앞벽)
  win_x1: 0.60, win_x2: 2.70, win_y1: 0.90, win_y2: 2.00,
  // 토글
  show_loft: true,
  auto_hide: true,
  // 액션
  reset: () => resetParams(),
  dump: () => openDump(),
  rotate_bath: () => rotateBathroom(),
};
const defaults = JSON.parse(JSON.stringify(params));
function resetParams() {
  for (const k in defaults) if (typeof defaults[k] !== 'function') params[k] = defaults[k];
  gui.controllersRecursive().forEach(c => c.updateDisplay());
  rebuild();
}

// JSON 덤프/적용
function paramsToJson() {
  const out = {};
  for (const k in params) {
    if (typeof params[k] === 'function') continue;
    out[k] = params[k];
  }
  return JSON.stringify(out, null, 2);
}
window.openDump = function() {
  document.getElementById('dumpText').value = paramsToJson();
  document.getElementById('dumpStatus').textContent = '';
  document.getElementById('dumpPanel').style.display = 'block';
};
window.copyDump = function() {
  const t = document.getElementById('dumpText');
  t.select();
  navigator.clipboard.writeText(t.value).then(
    () => { document.getElementById('dumpStatus').textContent = '✓ 클립보드 복사됨'; },
    () => { document.execCommand('copy'); document.getElementById('dumpStatus').textContent = '✓ 복사 (fallback)'; }
  );
};
window.applyDump = function() {
  try {
    const obj = JSON.parse(document.getElementById('dumpText').value);
    let n = 0;
    for (const k in obj) {
      if (k in params && typeof params[k] !== 'function' && typeof obj[k] === typeof params[k]) {
        params[k] = obj[k]; n++;
      }
    }
    gui.controllersRecursive().forEach(c => c.updateDisplay());
    rebuild();
    document.getElementById('dumpStatus').textContent = `✓ ${n}개 값 적용됨`;
  } catch (e) {
    document.getElementById('dumpStatus').textContent = '✗ JSON 파싱 실패: ' + e.message;
  }
};
window.closeDump = function() {
  document.getElementById('dumpPanel').style.display = 'none';
};

// 욕실 90° 회전 (back-right 코너 anchor 유지, 폭/깊이 swap)
function rotateBathroom() {
  const w = params.bath_x2 - params.bath_x1;
  const d = params.bath_z2 - params.bath_z1;
  const new_w = d, new_d = w;
  // 우측 외벽 anchor (bath_x2 = W) 유지
  params.bath_x2 = params.W;
  params.bath_x1 = Math.max(0, params.W - new_w);
  params.bath_z1 = 0;
  params.bath_z2 = Math.min(params.L - 0.5, new_d);
  // 도어 위치도 비율 보존
  const ratio_z1 = params.bath_door_z1 / d;
  const ratio_z2 = params.bath_door_z2 / d;
  params.bath_door_z1 = Math.min(params.bath_z2 - 0.4, ratio_z1 * new_d);
  params.bath_door_z2 = Math.min(params.bath_z2 - 0.05, ratio_z2 * new_d);
  gui.controllersRecursive().forEach(c => c.updateDisplay());
  rebuild();
}

const SLAB = 0.10;
const WALL_THK = 0.10;
const BATH_H = 2.00;

// ====== Scene / Renderer ======
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc8dcee);
scene.fog = new THREE.Fog(0xc8dcee, 30, 80);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.3; controls.maxDistance = 30;
controls.target.set(params.W/2, 1.0, params.L/2);

// ====== Lights ======
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff2dc, 1.4);
sun.position.set(-12, 16, 14);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;   sun.shadow.camera.bottom = -15;
sun.shadow.bias = -0.0005;
scene.add(sun);
const ledA = new THREE.PointLight(0xfff5e0, 0.55, 5); scene.add(ledA);
const ledB = new THREE.PointLight(0xfff5e0, 0.55, 5); scene.add(ledB);
const bathL = new THREE.PointLight(0xfff0d8, 0.4, 2.5); scene.add(bathL);

// ====== Materials ======
const M = {
  wall:        new THREE.MeshStandardMaterial({ color: 0xf6f3ec, roughness: 0.95, side: THREE.DoubleSide }),
  wallExt:     new THREE.MeshStandardMaterial({ color: 0xe5e0d4, roughness: 0.95, side: THREE.DoubleSide }),
  ceiling:     new THREE.MeshStandardMaterial({ color: 0xeae6dc, roughness: 0.95 }),
  floor:       new THREE.MeshStandardMaterial({ color: 0xe8d4ae, roughness: 0.55 }),
  floorBath:   new THREE.MeshStandardMaterial({ color: 0x8a6f5a, roughness: 0.5 }),
  accentTile:  new THREE.MeshStandardMaterial({ color: 0x5a4a3c, roughness: 0.45 }),
  cabGloss:    new THREE.MeshStandardMaterial({ color: 0xfaf6ea, roughness: 0.18, metalness: 0.05 }),
  counter:     new THREE.MeshStandardMaterial({ color: 0xf2efe5, roughness: 0.3 }),
  woodStep:    new THREE.MeshStandardMaterial({ color: 0xb88858, roughness: 0.55 }),
  woodFrame:   new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.55 }),
  rail:        new THREE.MeshStandardMaterial({ color: 0xfafaf6, roughness: 0.5 }),
  stairSide:   new THREE.MeshStandardMaterial({ color: 0xfafaf6, roughness: 0.5, side: THREE.DoubleSide }),
  metal:       new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.35, metalness: 0.6 }),
  black:       new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4 }),
  door:        new THREE.MeshStandardMaterial({ color: 0xd5cab2, roughness: 0.55 }),
  doorBath:    new THREE.MeshStandardMaterial({ color: 0xeae0c8, roughness: 0.5 }),
  ac:          new THREE.MeshStandardMaterial({ color: 0xfafaf2, roughness: 0.55 }),
  wallpad:     new THREE.MeshStandardMaterial({ color: 0x222, roughness: 0.4 }),
  ledPanel:    new THREE.MeshStandardMaterial({ color: 0xfffaee, roughness: 0.3, emissive: 0xfff5e0, emissiveIntensity: 0.5 }),
  seam:        new THREE.MeshStandardMaterial({ color: 0xc8c0aa, roughness: 0.6 }),
  mull:        new THREE.MeshStandardMaterial({ color: 0xe0dccf, roughness: 0.5 }),
  glass:       new THREE.MeshPhysicalMaterial({ color: 0xb8d2e6, transmission: 0.85, opacity: 0.35, transparent: true, roughness: 0.05, thickness: 0.05, side: THREE.DoubleSide }),
  showerGlass: new THREE.MeshPhysicalMaterial({ color: 0xeef4f8, transmission: 0.92, opacity: 0.22, transparent: true, roughness: 0.02, thickness: 0.04, side: THREE.DoubleSide }),
};

function box(w, h, d, mat, x, y, z, parent) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  parent.add(m);
  return m;
}

// ====== Ground ======
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x6a8761, roughness: 1 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.06;
ground.receiveShadow = true;
scene.add(ground);

// ====== Building (rebuilt on every change) ======
const building = new THREE.Group();
scene.add(building);

let ext, ceilingGroup, loftGroup;

function clearBuilding() {
  building.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  while (building.children.length) building.remove(building.children[0]);
}

function rebuild() {
  clearBuilding();
  const p = params;

  ext = { west: new THREE.Group(), east: new THREE.Group(), south: new THREE.Group(), north: new THREE.Group() };
  for (const g of Object.values(ext)) building.add(g);
  ceilingGroup = new THREE.Group(); building.add(ceilingGroup);
  loftGroup = new THREE.Group(); building.add(loftGroup);
  loftGroup.visible = p.show_loft;

  const TH = p.H1 + SLAB + p.H_LOFT;

  // Lights position
  ledA.position.set(p.W/2, p.H1 - 0.12, p.L * 0.45);
  ledB.position.set(p.W/2 - 0.3, p.H1 - 0.12, p.L * 0.80);
  bathL.position.set((p.bath_x1+p.bath_x2)/2, BATH_H - 0.1, (p.bath_z1+p.bath_z2)/2);

  // === Floor ===
  // 메인 (z>bath_z2)
  box(p.W, 0.04, p.L - p.bath_z2, M.floor, p.W/2, 0.02, (p.bath_z2 + p.L)/2, building);
  // 욕실 좌측 (x<bath_x1, z<bath_z2)
  if (p.bath_x1 > 0)
    box(p.bath_x1, 0.04, p.bath_z2, M.floor, p.bath_x1/2, 0.02, p.bath_z2/2, building);
  // 욕실 우측 (x>bath_x2, z<bath_z2)
  if (p.bath_x2 < p.W)
    box(p.W - p.bath_x2, 0.04, p.bath_z2, M.floor, (p.bath_x2 + p.W)/2, 0.02, p.bath_z2/2, building);
  // 욕실 바닥 (브라운 타일)
  box(p.bath_x2 - p.bath_x1, 0.02, p.bath_z2 - p.bath_z1, M.floorBath,
      (p.bath_x1+p.bath_x2)/2, 0.02, (p.bath_z1+p.bath_z2)/2, building);

  // === External walls ===
  box(WALL_THK, TH, p.L + 2*WALL_THK, M.wallExt, -WALL_THK/2, TH/2, p.L/2, ext.west);
  box(WALL_THK, TH, p.L + 2*WALL_THK, M.wallExt, p.W + WALL_THK/2, TH/2, p.L/2, ext.east);

  // 북측 (z=0): 현관 cutout
  if (p.ent_x1 > 0)
    box(p.ent_x1 + WALL_THK, TH, WALL_THK, M.wallExt,
        (p.ent_x1 - WALL_THK)/2, TH/2, -WALL_THK/2, ext.north);
  if (p.ent_x2 < p.W)
    box(p.W - p.ent_x2 + WALL_THK, TH, WALL_THK, M.wallExt,
        (p.ent_x2 + p.W + WALL_THK)/2, TH/2, -WALL_THK/2, ext.north);
  box(p.ent_x2 - p.ent_x1, TH - 2.0, WALL_THK, M.wallExt,
      (p.ent_x1+p.ent_x2)/2, (2.0 + TH)/2, -WALL_THK/2, ext.north);
  box(p.ent_x2 - p.ent_x1 - 0.05, 1.95, 0.04, M.door,
      (p.ent_x1+p.ent_x2)/2, 0.975, -WALL_THK/2 - 0.025, ext.north);
  box(0.07, 0.18, 0.025, M.black,
      p.ent_x1 + 0.18, 1.10, -WALL_THK/2 - 0.05, ext.north);

  // 남측 (z=L): 창 cutout
  box(p.W + 2*WALL_THK, p.win_y1, WALL_THK, M.wallExt,
      p.W/2, p.win_y1/2, p.L + WALL_THK/2, ext.south);
  box(p.W + 2*WALL_THK, TH - p.win_y2, WALL_THK, M.wallExt,
      p.W/2, (p.win_y2 + TH)/2, p.L + WALL_THK/2, ext.south);
  if (p.win_x1 > 0)
    box(p.win_x1 + WALL_THK, p.win_y2 - p.win_y1, WALL_THK, M.wallExt,
        (p.win_x1 - WALL_THK)/2, (p.win_y1+p.win_y2)/2, p.L + WALL_THK/2, ext.south);
  if (p.win_x2 < p.W)
    box(p.W - p.win_x2 + WALL_THK, p.win_y2 - p.win_y1, WALL_THK, M.wallExt,
        (p.win_x2 + p.W + WALL_THK)/2, (p.win_y1+p.win_y2)/2, p.L + WALL_THK/2, ext.south);
  box(p.win_x2 - p.win_x1, p.win_y2 - p.win_y1, 0.04, M.glass,
      (p.win_x1+p.win_x2)/2, (p.win_y1+p.win_y2)/2, p.L + WALL_THK/2, ext.south);
  box(p.win_x2 - p.win_x1, 0.04, 0.05, M.mull,
      (p.win_x1+p.win_x2)/2, (p.win_y1+p.win_y2)/2, p.L + WALL_THK/2, ext.south);
  for (let i = 1; i < 3; i++) {
    const x = p.win_x1 + (p.win_x2 - p.win_x1) * i / 3;
    box(0.04, p.win_y2 - p.win_y1, 0.05, M.mull,
        x, (p.win_y1+p.win_y2)/2, p.L + WALL_THK/2, ext.south);
  }

  // === 천장 ===
  box(p.W, 0.05, p.L, M.ceiling, p.W/2, TH - 0.025, p.L/2, ceilingGroup);
  box(0.55, 0.025, 0.55, M.ledPanel, p.W/2,        p.H1 - 0.06, p.L * 0.45, ceilingGroup);
  box(0.55, 0.025, 0.55, M.ledPanel, p.W/2 - 0.30, p.H1 - 0.06, p.L * 0.80, ceilingGroup);

  // === 욕실 ===
  // 서측 벽 (도어 cut)
  box(WALL_THK, BATH_H, p.bath_door_z1, M.wall, p.bath_x1, BATH_H/2, p.bath_door_z1/2, building);
  box(WALL_THK, BATH_H, p.bath_z2 - p.bath_door_z2, M.wall,
      p.bath_x1, BATH_H/2, (p.bath_door_z2+p.bath_z2)/2, building);
  // 남측 벽
  box(p.bath_x2 - p.bath_x1, BATH_H, WALL_THK, M.wall,
      (p.bath_x1+p.bath_x2)/2, BATH_H/2, p.bath_z2, building);
  // 욕실 천장
  box(p.bath_x2 - p.bath_x1, 0.05, p.bath_z2 - p.bath_z1, M.ceiling,
      (p.bath_x1+p.bath_x2)/2, BATH_H, (p.bath_z1+p.bath_z2)/2, building);
  // 욕실 도어
  box(0.04, 1.95, p.bath_door_z2 - p.bath_door_z1 - 0.05, M.doorBath,
      p.bath_x1 + 0.025, 0.975, (p.bath_door_z1+p.bath_door_z2)/2, building);
  // 액센트 타일 (북벽)
  box(p.bath_x2 - p.bath_x1 - 0.02, 0.55, 0.02, M.accentTile,
      (p.bath_x1+p.bath_x2)/2, 1.55, p.bath_z1 + 0.04, building);
  // 거울 (북벽 동쪽 절반)
  const sinkX = p.bath_x1 + (p.bath_x2 - p.bath_x1) * 0.65;
  box(0.55, 0.50, 0.04, M.glass,    sinkX, 1.45, p.bath_z1 + 0.04, building);
  box(0.62, 0.58, 0.05, M.woodFrame, sinkX, 1.45, p.bath_z1 + 0.020, building);
  // 세면대 (북벽)
  box(0.50, 0.06, 0.40, M.counter, sinkX, 0.85, p.bath_z1 + 0.20, building);
  box(0.36, 0.18, 0.34, M.counter, sinkX, 0.72, p.bath_z1 + 0.18, building);
  {
    const f = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.020, 0.18, 12), M.metal);
    f.position.set(sinkX, 0.97, p.bath_z1 + 0.10); building.add(f);
  }
  // 변기 (남동 코너)
  box(0.36, 0.40, 0.55, M.counter, p.bath_x2 - 0.22, 0.20, p.bath_z2 - 0.30, building);
  box(0.40, 0.45, 0.18, M.counter, p.bath_x2 - 0.22, 0.62, p.bath_z2 - 0.10, building);
  // 샤워 (북서 코너) - 글라스 박스
  const SH_W = 0.65, SH_D = Math.min(0.95, p.bath_z2 - 0.10);
  box(0.04, BATH_H - 0.10, SH_D, M.showerGlass,
      p.bath_x1 + SH_W, BATH_H/2 - 0.05, p.bath_z1 + SH_D/2, building);
  box(0.50, BATH_H - 0.10, 0.04, M.showerGlass,
      p.bath_x1 + SH_W - 0.25, BATH_H/2 - 0.05, p.bath_z1 + SH_D, building);
  {
    const head = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.04, 16), M.metal);
    head.position.set(p.bath_x1 + 0.06, 1.93, p.bath_z1 + 0.30);
    head.rotation.z = Math.PI/2;
    building.add(head);
  }
  box(0.06, 0.20, 0.04, M.metal, p.bath_x1 + 0.04, 1.05, p.bath_z1 + 0.30, building);
  box(0.20, 0.005, 0.20, M.black, p.bath_x1 + 0.30, 0.03, p.bath_z1 + 0.40, building);

  // === 부엌 (좌측 긴벽 니치) ===
  const KX1 = 0.0, KX2 = p.kit_depth;
  const KMID = (KX1 + KX2)/2;
  // 하부장
  box(p.kit_depth, 0.85, p.kit_z2 - p.kit_z1, M.cabGloss,
      KMID, 0.45, (p.kit_z1+p.kit_z2)/2, building);
  // 카운터
  box(p.kit_depth + 0.02, 0.04, p.kit_z2 - p.kit_z1 + 0.02, M.counter,
      KMID + 0.01, 0.91, (p.kit_z1+p.kit_z2)/2, building);
  // 인덕션 (z 뒷쪽, 세탁기 위)
  box(0.40, 0.025, 0.34, M.black, KMID, 0.94, p.kit_z1 + 0.20, building);
  for (let i = 0; i < 2; i++) {
    const cm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.075, 0.075, 0.005, 24),
      new THREE.MeshStandardMaterial({color:0x333, roughness:0.6})
    );
    cm.position.set(KMID, 0.945, p.kit_z1 + 0.10 + i*0.20);
    building.add(cm);
  }
  // 싱크 (앞쪽)
  box(0.45, 0.10, 0.34, M.black, KMID, 0.86, p.kit_z2 - 0.32, building);
  {
    const f = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.020, 0.22, 12), M.metal);
    f.position.set(p.kit_depth - 0.10, 1.04, p.kit_z2 - 0.32); building.add(f);
  }
  // 세탁기 (인덕션 아래)
  box(0.55, 0.83, 0.55, M.cabGloss, KMID, 0.42, p.kit_z1 + 0.30, building);
  {
    const drum = new THREE.Mesh(
      new THREE.CircleGeometry(0.16, 32),
      new THREE.MeshPhysicalMaterial({color:0x222, transmission:0.3, roughness:0.1, transparent:true, opacity:0.7})
    );
    drum.position.set(p.kit_depth + 0.001, 0.42, p.kit_z1 + 0.30);
    drum.rotation.y = Math.PI/2;
    building.add(drum);
  }
  // 상부장
  box(p.kit_depth, 0.60, p.kit_z2 - p.kit_z1, M.cabGloss,
      KMID, p.H1 - 0.32, (p.kit_z1+p.kit_z2)/2, building);
  for (let i = 1; i < 3; i++) {
    const z = p.kit_z1 + (p.kit_z2 - p.kit_z1) * i / 3;
    box(p.kit_depth + 0.01, 0.58, 0.012, M.seam,
        KMID + 0.001, p.H1 - 0.32, z, building);
  }

  // === 좌측 옷장 (북측 + 남측, 부엌 양쪽) ===
  buildWardrobe(0, p.kit_depth, p.wd_left_north_z1, p.wd_left_north_z2, p.H1 - 0.04, 'east');
  buildWardrobe(0, p.kit_depth, p.wd_left_south_z1, p.wd_left_south_z2, p.H1 - 0.04, 'east');

  // === 계단 ===
  buildStairs(p);

  // === 복층 ===
  // 바닥
  box(p.W, SLAB, p.loft_z2, M.woodStep, p.W/2, p.H1 + SLAB/2, p.loft_z2/2, loftGroup);
  // 정면 그리드 수납 (난간)
  const SH_Y0 = p.H1 + SLAB, SH_HH = 0.85;
  for (let j = 0; j <= 3; j++) {
    const y = SH_Y0 + SH_HH * j / 3;
    box(p.W, 0.025, 0.30, M.rail, p.W/2, y, p.loft_z2 - 0.15, loftGroup);
  }
  for (let i = 0; i <= 5; i++) {
    const x = p.W * i / 5;
    box(0.02, SH_HH, 0.30, M.rail, x, SH_Y0 + SH_HH/2, p.loft_z2 - 0.15, loftGroup);
  }
  // 부엌 위 그리드 책장
  const SH2_X1 = 0.0, SH2_X2 = p.kit_depth + 0.30;
  const SH2_Z1 = p.kit_z1 - 0.20, SH2_Z2 = p.kit_z2 + 0.20;
  const SH2_Y1 = p.H1 + SLAB + 0.02, SH2_Y2 = TH - 0.05;
  for (let i = 0; i <= 3; i++) {
    const x = SH2_X1 + (SH2_X2 - SH2_X1) * i / 3;
    box(0.018, SH2_Y2 - SH2_Y1, SH2_Z2 - SH2_Z1, M.rail,
        x, (SH2_Y1+SH2_Y2)/2, (SH2_Z1+SH2_Z2)/2, loftGroup);
  }
  for (let j = 0; j <= 2; j++) {
    const y = SH2_Y1 + (SH2_Y2 - SH2_Y1) * j / 2;
    box(SH2_X2 - SH2_X1, 0.018, SH2_Z2 - SH2_Z1, M.rail,
        (SH2_X1+SH2_X2)/2, y, (SH2_Z1+SH2_Z2)/2, loftGroup);
  }

  // === AC (좌측 벽 윗쪽, 창쪽) ===
  box(0.85, 0.28, 0.22, M.ac, 0.12, p.H1 - 0.22, p.L - 0.55, building);
  box(0.78, 0.04, 0.005, M.black, 0.12, p.H1 - 0.10, p.L - 0.45, building);

  // === 월패드 ===
  box(0.025, 0.18, 0.13, M.wallpad, p.ent_x2 + 0.10, 1.50, 0.04 + WALL_THK/2, building);
  box(0.005, 0.14, 0.10, M.glass,   p.ent_x2 + 0.114, 1.50, 0.04 + WALL_THK/2, building);

  // === 신발 ===
  box(0.20, 0.05, 0.10, M.black, p.ent_x1 + 0.20, 0.045, 0.20, building);
  box(0.20, 0.05, 0.10, M.black, p.ent_x1 + 0.45, 0.045, 0.20, building);

  controls.target.set(p.W/2, 1.0, p.L/2);
}

// === 옷장 헬퍼 ===
function buildWardrobe(x1, x2, z1, z2, h, openSide) {
  if (z2 <= z1) return;
  box(x2 - x1, h, z2 - z1, M.cabGloss, (x1+x2)/2, h/2 + 0.02, (z1+z2)/2, building);
  const len = z2 - z1;
  const n = Math.max(2, Math.round(len / 0.55));
  for (let i = 1; i < n; i++) {
    const z = z1 + len * i / n;
    box((x2-x1) + 0.01, h - 0.06, 0.012, M.seam,
        (x1+x2)/2 + 0.001, (h-0.06)/2 + 0.05, z, building);
  }
  for (let i = 0; i < n; i++) {
    const z = z1 + len * (i + 0.5) / n;
    if (openSide === 'east')
      box(0.005, 0.40, 0.012, M.metal, x2 + 0.003, 0.95, z, building);
    else if (openSide === 'west')
      box(0.005, 0.40, 0.012, M.metal, x1 - 0.003, 0.95, z, building);
  }
}

// === 계단 헬퍼 (개선된 saw-tooth 사이드 패널) ===
function buildStairs(p) {
  const N = Math.max(3, Math.round(p.stair_steps));
  let x1, x2, z1, z2, runAxis;
  if (p.stair_dir === 'EW') {
    x1 = p.stair_x1; x2 = p.stair_x2;     // bottom→top in x
    z1 = p.stair_z_top; z2 = p.stair_z_bot;
    runAxis = 'x';
  } else { // NS
    x1 = p.stair_x1; x2 = p.stair_x2;     // 폭 (x range, 일정)
    z1 = p.stair_z_bot; z2 = p.stair_z_top; // bottom z → top z (top closer to back wall)
    runAxis = 'z';
  }
  const stair_w = Math.abs(x2 - x1);
  const total_run = (runAxis === 'x') ? Math.abs(p.stair_x2 - p.stair_x1) : Math.abs(p.stair_z_bot - p.stair_z_top);
  const run = total_run / N;
  const rise = p.H1 / N;

  for (let i = 0; i < N; i++) {
    let cx, cz, tw, td;
    if (runAxis === 'x') {
      // bottom at x1, top at x2 (assuming x2>x1)
      cx = p.stair_x1 + i * run + run/2;
      cz = (p.stair_z_top + p.stair_z_bot)/2;
      tw = run * 0.95; td = stair_w * 0.92;
    } else {
      // NS: bottom at z=stair_z_bot, top at z=stair_z_top (z_bot > z_top)
      const dir = Math.sign(p.stair_z_top - p.stair_z_bot); // -1: 북쪽이 top
      cz = p.stair_z_bot + (i + 0.5) * run * dir;
      cx = (p.stair_x1 + p.stair_x2)/2;
      tw = stair_w * 0.92; td = run * 0.95;
    }
    const cy = i * rise + rise/2;
    box(tw, 0.04, td, M.woodStep, cx, cy + rise/2, cz, building);
  }

  // 흰색 saw-tooth 사이드 패널 (각 단마다 채움)
  // 한쪽 면 (북쪽 / "벽쪽")
  for (let i = 0; i < N; i++) {
    const cy_top = (i+1) * rise;
    let cx, cz, w, d;
    if (runAxis === 'x') {
      cx = p.stair_x1 + i * run + run/2;
      cz = p.stair_z_top + 0.012;
      w = run; d = 0.025;
    } else {
      const dir = Math.sign(p.stair_z_top - p.stair_z_bot);
      cz = p.stair_z_bot + (i + 0.5) * run * dir;
      cx = (p.stair_x1 < p.stair_x2 ? p.stair_x1 : p.stair_x2) + 0.012;
      w = 0.025; d = run;
    }
    box(w, cy_top, d, M.stairSide, cx, cy_top/2, cz, building);
  }

  // 핸드레일 (다른 쪽, 거실쪽)
  const len = Math.hypot(total_run, p.H1);
  const ang = Math.atan2(p.H1, total_run);
  const rail = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, len, 8), M.metal);
  if (runAxis === 'x') {
    rail.position.set((p.stair_x1+p.stair_x2)/2, p.H1/2 + 0.95, p.stair_z_bot - 0.02);
    rail.rotation.z = ang - Math.PI/2;
  } else {
    const railSide = (p.stair_x1 < p.stair_x2 ? p.stair_x2 : p.stair_x1) - 0.02;
    rail.position.set(railSide, p.H1/2 + 0.95, (p.stair_z_top+p.stair_z_bot)/2);
    rail.rotation.x = ang + Math.PI/2 * Math.sign(p.stair_z_top - p.stair_z_bot);
  }
  building.add(rail);

  // 핸드레일 수직 지지봉
  for (let i = 0; i <= N; i += 2) {
    const cy = i * rise;
    if (cy >= p.H1 - 0.05) continue;
    let cx, cz;
    if (runAxis === 'x') {
      cx = p.stair_x1 + i * run;
      cz = p.stair_z_bot - 0.02;
    } else {
      const dir = Math.sign(p.stair_z_top - p.stair_z_bot);
      cz = p.stair_z_bot + i * run * dir;
      cx = (p.stair_x1 < p.stair_x2 ? p.stair_x2 : p.stair_x1) - 0.02;
    }
    box(0.012, p.H1 - cy + 0.05, 0.012, M.metal, cx, (cy + p.H1 + 0.05)/2, cz, building);
  }
}

// ====== 자동 벽/천장 숨김 ======
function updateAutoHide() {
  if (!params.auto_hide || !ext) {
    if (ext) for (const g of Object.values(ext)) g.visible = true;
    if (ceilingGroup) ceilingGroup.visible = true;
    return;
  }
  const cam = camera.position;
  const TH = params.H1 + SLAB + params.H_LOFT;
  ext.west.visible  = !(cam.x < 0);
  ext.east.visible  = !(cam.x > params.W);
  ext.north.visible = !(cam.z < 0);
  ext.south.visible = !(cam.z > params.L);
  ceilingGroup.visible = !(cam.y > TH);
}

// ====== Views ======
function setView(name) {
  const p = params;
  const t = new THREE.Vector3(p.W/2, 1.0, p.L/2);
  let pos;
  if (name === 'top') {
    pos = new THREE.Vector3(p.W/2 + 0.01, 14, p.L/2);
  } else if (name === 'front') {
    pos = new THREE.Vector3(p.W/2, 1.6, p.L + 6);
    t.set(p.W/2, 1.4, p.L/2);
  } else if (name === 'back') {
    pos = new THREE.Vector3(p.W/2, 1.6, -6);
    t.set(p.W/2, 1.4, p.L/2);
  } else if (name === 'inside') {
    pos = new THREE.Vector3(p.W/2 + 0.3, 1.4, p.L - 0.5);
    t.set(p.W/2, 1.4, 0.5);
  } else {
    pos = new THREE.Vector3(p.W + 5, 6.0, p.L + 5);
  }
  animateCamera(camera.position.clone(), pos, controls.target.clone(), t, 600);
}
function animateCamera(p0, p1, t0, t1, ms) {
  const start = performance.now();
  function step(now) {
    const k = Math.min(1, (now - start)/ms);
    const e = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
    camera.position.lerpVectors(p0, p1, e);
    controls.target.lerpVectors(t0, t1, e);
    controls.update();
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
window.setView = setView;

// ====== GUI ======
const gui = new GUI({ title: '레이아웃 조정' });
const onChange = () => rebuild();

const fUnit = gui.addFolder('전체 치수');
fUnit.add(params, 'W', 2.5, 5.0).step(0.05).name('폭 (m)').onChange(onChange);
fUnit.add(params, 'L', 4.0, 8.0).step(0.05).name('깊이 (m)').onChange(onChange);
fUnit.add(params, 'H1', 1.8, 3.0).step(0.05).name('1F 천장').onChange(onChange);
fUnit.add(params, 'H_LOFT', 0.6, 1.5).step(0.05).name('복층 천장').onChange(onChange);

const fEnt = gui.addFolder('현관 (북측)');
fEnt.add(params, 'ent_x1', 0, 3).step(0.05).name('도어 좌측 x').onChange(onChange);
fEnt.add(params, 'ent_x2', 0, 3.3).step(0.05).name('도어 우측 x').onChange(onChange);

const fBath = gui.addFolder('욕실');
fBath.add(params, 'bath_x1', 0, 3).step(0.05).name('서측벽 x').onChange(onChange);
fBath.add(params, 'bath_x2', 0.5, 3.30).step(0.05).name('동측벽 x').onChange(onChange);
fBath.add(params, 'bath_z1', 0, 3).step(0.05).name('북측벽 z').onChange(onChange);
fBath.add(params, 'bath_z2', 0.5, 5).step(0.05).name('남측벽 z').onChange(onChange);
fBath.add(params, 'bath_door_z1', 0, 4).step(0.05).name('도어 z 시작').onChange(onChange);
fBath.add(params, 'bath_door_z2', 0.3, 5).step(0.05).name('도어 z 끝').onChange(onChange);
fBath.add(params, 'rotate_bath').name('🔄 욕실 90° 회전 (가로↔세로)');

const fLeft = gui.addFolder('좌측 벽 (북옷장 → 부엌 → 남옷장)');
fLeft.add(params, 'kit_depth', 0.3, 0.8).step(0.05).name('공통 깊이').onChange(onChange);
fLeft.add(params, 'wd_left_north_z1', 0, 5).step(0.05).name('북옷장 z 시작').onChange(onChange);
fLeft.add(params, 'wd_left_north_z2', 0, 5).step(0.05).name('북옷장 z 끝').onChange(onChange);
fLeft.add(params, 'kit_z1', 0, 5).step(0.05).name('부엌 z 시작').onChange(onChange);
fLeft.add(params, 'kit_z2', 0, 5).step(0.05).name('부엌 z 끝').onChange(onChange);
fLeft.add(params, 'wd_left_south_z1', 0, 5).step(0.05).name('남옷장 z 시작').onChange(onChange);
fLeft.add(params, 'wd_left_south_z2', 0.5, 5.5).step(0.05).name('남옷장 z 끝').onChange(onChange);

const fStair = gui.addFolder('계단');
fStair.add(params, 'stair_dir', { 'NS (남북)':'NS', 'EW (동서)':'EW' }).name('진행 방향').onChange(onChange);
fStair.add(params, 'stair_steps', 6, 16).step(1).name('단수').onChange(onChange);
fStair.add(params, 'stair_x1', 0, 3.3).step(0.05).name('x1 (NS:폭 좌)').onChange(onChange);
fStair.add(params, 'stair_x2', 0, 3.3).step(0.05).name('x2 (NS:폭 우)').onChange(onChange);
fStair.add(params, 'stair_z_top', 0, 5).step(0.05).name('top z (복층쪽)').onChange(onChange);
fStair.add(params, 'stair_z_bot', 0, 6).step(0.05).name('bottom z').onChange(onChange);

const fLoft = gui.addFolder('복층');
fLoft.add(params, 'loft_z2', 1.5, 6).step(0.05).name('복층 끝 z').onChange(onChange);

const fWin = gui.addFolder('창문');
fWin.add(params, 'win_x1', 0, 3.3).step(0.05).name('x1').onChange(onChange);
fWin.add(params, 'win_x2', 0, 3.3).step(0.05).name('x2').onChange(onChange);
fWin.add(params, 'win_y1', 0, 2.5).step(0.05).name('하단 높이').onChange(onChange);
fWin.add(params, 'win_y2', 0.5, 3).step(0.05).name('상단 높이').onChange(onChange);

const fTog = gui.addFolder('토글');
fTog.add(params, 'show_loft').name('복층 표시').onChange(v => { if (loftGroup) loftGroup.visible = v; });
fTog.add(params, 'auto_hide').name('벽 자동숨김');
gui.add(params, 'dump').name('📋 JSON 덤프 / 불러오기');
gui.add(params, 'reset').name('↻ 기본값으로 리셋');
gui.close();

// ====== Init ======
rebuild();
setView('iso');

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateAutoHide();
  renderer.render(scene, camera);
}
animate();
</script>

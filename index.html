<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>복층 원룸 3D 뷰어 v3</title>
<style>
  body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #b0d0e8; }
  #info {
    position: absolute; top: 12px; left: 12px; color: white;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; z-index: 10; line-height: 1.55;
    backdrop-filter: blur(6px); max-width: 320px;
  }
  #controls {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.55); padding: 10px; border-radius: 8px;
    z-index: 10; backdrop-filter: blur(6px);
  }
  button {
    background: #555; color: white; border: 1px solid #777;
    padding: 6px 12px; margin: 2px; border-radius: 5px; cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #777; }
  button.active { background: #2a7; border-color: #4d9; }
  small { opacity: .7; }
</style>
</head>
<body>
<div id="info">
  <strong>복층 원룸 3D v3</strong><br>
  <small>3.30 × 5.62 m · 1F 2.0m + Loft 0.9m</small><br>
  좌클릭+드래그: 회전 / 휠: 확대 / 우클릭+드래그: 이동<br>
  <small>※ 시야 쪽 외벽/천장은 자동 숨김</small>
</div>
<div id="controls">
  <button onclick="setView('iso')">아이소</button>
  <button onclick="setView('top')">위에서</button>
  <button onclick="setView('front')">정면(창)</button>
  <button onclick="setView('back')">뒤(현관)</button>
  <button onclick="setView('inside')">실내</button>
  <button id="btnAutoHide" class="active" onclick="toggleAutoHide()">벽 자동숨김 ON</button>
  <button id="btnLoft" class="active" onclick="toggleLoft()">복층 ON</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ====== Dimensions (m) ======
const W = 3.30;
const L = 5.62;
const H1 = 2.00;
const SLAB = 0.10;
const H_LOFT = 0.90;
const TH = H1 + SLAB + H_LOFT; // 3.00
const WALL_THK = 0.10;
const BATH_H = 2.00;

// ====== Layout ======
// 현관 도어 (북측 외벽 z=0)
const ED_X1 = 0.60, ED_X2 = 1.77;
// 욕실 (back-right, 1.35w × 1.06d)
const BX1 = 1.95, BX2 = 3.30;
const BZ1 = 0.00, BZ2 = 1.06;
const BD_Z1 = 0.25, BD_Z2 = 1.00;          // 욕실 도어 (서측면, 폭 0.75)
// 작은 수납 X (욕실 SE 옆, 0.85×0.47) — 욕실 외부, 짧은 벽으로 분리
const XCL_X1 = BX2 - 0.85, XCL_X2 = BX2;
const XCL_Z1 = BZ2,        XCL_Z2 = BZ2 + 0.47;

// 계단 (10단, 좌→우 ascending, 욕실 남측 벽 따라)
const N_STEPS = 10;
const STAIR_W = 0.50;                       // z 방향 폭
const STAIR_X1 = 0.00, STAIR_X2 = W;
const STAIR_Z1 = BZ2;                       // 1.06 (욕실 벽에 붙음)
const STAIR_Z2 = STAIR_Z1 + STAIR_W;        // 1.56
const stepRun  = (STAIR_X2 - STAIR_X1) / N_STEPS;  // 0.33
const stepRise = H1 / N_STEPS;              // 0.20

// 복층 (z=0 ~ 4.15)
const LOFT_Z2 = 4.15;
const LOFT_Y = H1 + SLAB;                   // 2.10

// 부엌 (좌측 긴벽 니치, 뒷벽쪽)
const KITCHEN_DEPTH = 0.55;
const KX1 = 0.00, KX2 = KITCHEN_DEPTH;      // 0~0.55
const KZ1 = 0.04, KZ2 = KZ1 + 1.17;         // 0.04~1.21

// 좌측 옷장 (부엌 남쪽, 풀하이트)
const WDL_X1 = 0.00, WDL_X2 = WD_DEPTH_LEFT();
function WD_DEPTH_LEFT(){ return 0.55; }
const WDL_Z1 = KZ2,  WDL_Z2 = LOFT_Z2;      // 1.21~4.15

// 창 (앞벽 z=L)
const WIN_X1 = 0.60, WIN_X2 = 2.70;
const WIN_Y1 = 0.90, WIN_Y2 = 2.00;

// ====== Scene / Camera / Renderer ======
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc8dcee);
scene.fog = new THREE.Fog(0xc8dcee, 30, 80);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.3;
controls.maxDistance = 30;
controls.target.set(W/2, 1.0, L/2);

// ====== Lights ======
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff2dc, 1.4);
sun.position.set(-12, 16, 14);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;   sun.shadow.camera.bottom = -15;
sun.shadow.bias = -0.0005;
scene.add(sun);

const ledA = new THREE.PointLight(0xfff5e0, 0.55, 5);
ledA.position.set(W/2, H1 - 0.12, 2.7);
scene.add(ledA);
const ledB = new THREE.PointLight(0xfff5e0, 0.55, 5);
ledB.position.set(W/2 - 0.3, H1 - 0.12, 4.5);
scene.add(ledB);
const bathL = new THREE.PointLight(0xfff0d8, 0.4, 2.5);
bathL.position.set((BX1+BX2)/2, BATH_H - 0.1, (BZ1+BZ2)/2);
scene.add(bathL);

// ====== Materials ======
const wallMat        = new THREE.MeshStandardMaterial({ color: 0xf6f3ec, roughness: 0.95, side: THREE.DoubleSide });
const wallExtMat     = new THREE.MeshStandardMaterial({ color: 0xe5e0d4, roughness: 0.95, side: THREE.DoubleSide });
const ceilingMat     = new THREE.MeshStandardMaterial({ color: 0xeae6dc, roughness: 0.95 });
const floorMat       = new THREE.MeshStandardMaterial({ color: 0xe8d4ae, roughness: 0.55 });
const floorBathMat   = new THREE.MeshStandardMaterial({ color: 0x8a6f5a, roughness: 0.5 });
const accentTileMat  = new THREE.MeshStandardMaterial({ color: 0x5a4a3c, roughness: 0.45 });
const cabinetGlossMat= new THREE.MeshStandardMaterial({ color: 0xfaf6ea, roughness: 0.18, metalness: 0.05 });
const counterMat     = new THREE.MeshStandardMaterial({ color: 0xf2efe5, roughness: 0.3 });
const woodStepMat    = new THREE.MeshStandardMaterial({ color: 0xb88858, roughness: 0.55 });
const woodFrameMat   = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.55 });
const railMat        = new THREE.MeshStandardMaterial({ color: 0xfafaf6, roughness: 0.5 });
const stairSideMat   = new THREE.MeshStandardMaterial({ color: 0xfafaf6, roughness: 0.5, side: THREE.DoubleSide });
const metalMat       = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.35, metalness: 0.6 });
const blackMat       = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4 });
const doorMat        = new THREE.MeshStandardMaterial({ color: 0xd5cab2, roughness: 0.55 });
const doorBathMat    = new THREE.MeshStandardMaterial({ color: 0xeae0c8, roughness: 0.5 });
const acMat          = new THREE.MeshStandardMaterial({ color: 0xfafaf2, roughness: 0.55 });
const wallpadMat     = new THREE.MeshStandardMaterial({ color: 0x222, roughness: 0.4 });
const ledPanelMat    = new THREE.MeshStandardMaterial({ color: 0xfffaee, roughness: 0.3, emissive: 0xfff5e0, emissiveIntensity: 0.5 });
const seamMat        = new THREE.MeshStandardMaterial({ color: 0xc8c0aa, roughness: 0.6 });
const mullMat        = new THREE.MeshStandardMaterial({ color: 0xe0dccf, roughness: 0.5 });
const glassMat       = new THREE.MeshPhysicalMaterial({
  color: 0xb8d2e6, transmission: 0.85, opacity: 0.35, transparent: true,
  roughness: 0.05, thickness: 0.05, side: THREE.DoubleSide
});
const showerGlassMat = new THREE.MeshPhysicalMaterial({
  color: 0xeef4f8, transmission: 0.92, opacity: 0.22, transparent: true,
  roughness: 0.02, thickness: 0.04, side: THREE.DoubleSide
});

function box(w, h, d, mat, x, y, z, parent=scene) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  parent.add(m);
  return m;
}

// ====== Ground ======
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x6a8761, roughness: 1 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.06;
ground.receiveShadow = true;
scene.add(ground);

// ====== Building ======
const building = new THREE.Group();
scene.add(building);

// 1F floor (욕실 영역 빼고)
// (1) 메인 (z>BZ2 전체 + z<BZ2 좌측 = x<BX1)
box(W, 0.04, L - BZ2, floorMat, W/2, 0.02, (BZ2 + L)/2, building);
box(BX1, 0.04, BZ2, floorMat, BX1/2, 0.02, BZ2/2, building);
// 욕실 바닥 (브라운 타일)
box(BX2 - BX1, 0.02, BZ2 - BZ1, floorBathMat,
    (BX1+BX2)/2, 0.02, (BZ1+BZ2)/2, building);

// ====== External walls ======
const ext = {
  west:  new THREE.Group(),
  east:  new THREE.Group(),
  south: new THREE.Group(),
  north: new THREE.Group()
};
for (const g of Object.values(ext)) building.add(g);

box(WALL_THK, TH, L + 2*WALL_THK, wallExtMat, -WALL_THK/2, TH/2, L/2, ext.west);
box(WALL_THK, TH, L + 2*WALL_THK, wallExtMat, W + WALL_THK/2, TH/2, L/2, ext.east);

// 북측 외벽 (z=0): 현관 cutout
box(ED_X1 + WALL_THK, TH, WALL_THK, wallExtMat,
    (ED_X1 - WALL_THK)/2, TH/2, -WALL_THK/2, ext.north);
box(W - ED_X2 + WALL_THK, TH, WALL_THK, wallExtMat,
    (ED_X2 + W + WALL_THK)/2, TH/2, -WALL_THK/2, ext.north);
box(ED_X2 - ED_X1, TH - 2.0, WALL_THK, wallExtMat,
    (ED_X1+ED_X2)/2, (2.0 + TH)/2, -WALL_THK/2, ext.north);
// 현관 도어
box(ED_X2 - ED_X1 - 0.05, 1.95, 0.04, doorMat,
    (ED_X1+ED_X2)/2, 0.975, -WALL_THK/2 - 0.025, ext.north);
box(0.07, 0.18, 0.025, blackMat,
    ED_X1 + 0.18, 1.10, -WALL_THK/2 - 0.05, ext.north);

// 남측 외벽 (z=L): 창 cutout
box(W + 2*WALL_THK, WIN_Y1, WALL_THK, wallExtMat,
    W/2, WIN_Y1/2, L + WALL_THK/2, ext.south);
box(W + 2*WALL_THK, TH - WIN_Y2, WALL_THK, wallExtMat,
    W/2, (WIN_Y2 + TH)/2, L + WALL_THK/2, ext.south);
box(WIN_X1 + WALL_THK, WIN_Y2 - WIN_Y1, WALL_THK, wallExtMat,
    (WIN_X1 - WALL_THK)/2, (WIN_Y1+WIN_Y2)/2, L + WALL_THK/2, ext.south);
box(W - WIN_X2 + WALL_THK, WIN_Y2 - WIN_Y1, WALL_THK, wallExtMat,
    (WIN_X2 + W + WALL_THK)/2, (WIN_Y1+WIN_Y2)/2, L + WALL_THK/2, ext.south);
box(WIN_X2 - WIN_X1, WIN_Y2 - WIN_Y1, 0.04, glassMat,
    (WIN_X1+WIN_X2)/2, (WIN_Y1+WIN_Y2)/2, L + WALL_THK/2, ext.south);
box(WIN_X2 - WIN_X1, 0.04, 0.05, mullMat,
    (WIN_X1+WIN_X2)/2, (WIN_Y1+WIN_Y2)/2, L + WALL_THK/2, ext.south);
for (let i = 1; i < 3; i++) {
  const x = WIN_X1 + (WIN_X2 - WIN_X1) * i / 3;
  box(0.04, WIN_Y2 - WIN_Y1, 0.05, mullMat,
      x, (WIN_Y1+WIN_Y2)/2, L + WALL_THK/2, ext.south);
}

// 천장
const ceilingGroup = new THREE.Group();
building.add(ceilingGroup);
box(W, 0.05, L, ceilingMat, W/2, TH - 0.025, L/2, ceilingGroup);
box(0.55, 0.025, 0.55, ledPanelMat, W/2,        H1 - 0.06, 2.7, ceilingGroup);
box(0.55, 0.025, 0.55, ledPanelMat, W/2 - 0.30, H1 - 0.06, 4.5, ceilingGroup);

// ====== 욕실 내부 ======
// 서측 (도어 cut) — 도어 아래 좌측 + 우측
box(WALL_THK, BATH_H, BD_Z1, wallMat, BX1, BATH_H/2, BD_Z1/2, building);
box(WALL_THK, BATH_H, BZ2 - BD_Z2, wallMat, BX1, BATH_H/2, (BD_Z2+BZ2)/2, building);
// 남측
box(BX2 - BX1, BATH_H, WALL_THK, wallMat, (BX1+BX2)/2, BATH_H/2, BZ2, building);
// 욕실 천장
box(BX2 - BX1, 0.05, BZ2 - BZ1, ceilingMat,
    (BX1+BX2)/2, BATH_H, (BZ1+BZ2)/2, building);
// 욕실 도어 (아이보리)
box(0.04, 1.95, BD_Z2 - BD_Z1 - 0.05, doorBathMat,
    BX1 + 0.025, 0.975, (BD_Z1+BD_Z2)/2, building);

// 액센트 타일 띠 (북벽)
box(BX2 - BX1 - 0.02, 0.55, 0.02, accentTileMat,
    (BX1+BX2)/2, 1.55, BZ1 + 0.04, building);

// 거울 + 우드프레임 (북벽, 세면대 위)
box(0.55, 0.50, 0.04, glassMat,
    BX1 + 0.95, 1.45, BZ1 + 0.04, building);
box(0.62, 0.58, 0.05, woodFrameMat,
    BX1 + 0.95, 1.45, BZ1 + 0.020, building);

// 세면대 (북벽, 벽걸이)
box(0.50, 0.06, 0.40, counterMat, BX1 + 0.95, 0.85, BZ1 + 0.20, building);
box(0.36, 0.18, 0.34, counterMat, BX1 + 0.95, 0.72, BZ1 + 0.18, building);
{
  const f = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.020, 0.18, 12), metalMat);
  f.position.set(BX1 + 0.95, 0.97, BZ1 + 0.10);
  building.add(f);
}

// 변기 (남동 코너)
box(0.36, 0.40, 0.55, counterMat, BX2 - 0.22, 0.20, BZ2 - 0.30, building);
box(0.40, 0.45, 0.18, counterMat, BX2 - 0.22, 0.62, BZ2 - 0.10, building);

// 샤워 (북서 코너) — 글라스 칸막이 + 도어
const SHOWER_W_X = 0.60;
const SHOWER_D_Z = 0.85;
// 동측 글라스
box(0.04, BATH_H - 0.10, SHOWER_D_Z, showerGlassMat,
    BX1 + SHOWER_W_X, BATH_H/2 - 0.05, BZ1 + SHOWER_D_Z/2, building);
// 남측 글라스 도어
box(0.45, BATH_H - 0.10, 0.04, showerGlassMat,
    BX1 + SHOWER_W_X - 0.225, BATH_H/2 - 0.05, BZ1 + SHOWER_D_Z, building);
// 샤워 헤드
{
  const head = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.04, 16), metalMat);
  head.position.set(BX1 + 0.06, 1.93, BZ1 + 0.30);
  head.rotation.z = Math.PI/2;
  building.add(head);
}
box(0.06, 0.20, 0.04, metalMat, BX1 + 0.04, 1.05, BZ1 + 0.30, building);
box(0.20, 0.005, 0.20, blackMat, BX1 + 0.30, 0.03, BZ1 + 0.40, building);

// ====== 부엌 (좌측 벽 니치, 뒷벽쪽) ======
// 하부장
box(KITCHEN_DEPTH, 0.85, KZ2 - KZ1, cabinetGlossMat,
    KX1 + KITCHEN_DEPTH/2, 0.45, (KZ1+KZ2)/2, building);
// 카운터 상판
box(KITCHEN_DEPTH + 0.02, 0.04, KZ2 - KZ1 + 0.02, counterMat,
    KX1 + KITCHEN_DEPTH/2 + 0.01, 0.91, (KZ1+KZ2)/2, building);
// 인덕션 (뒷쪽 = z=KZ1쪽, 세탁기 위)
box(0.40, 0.025, 0.34, blackMat,
    KX1 + KITCHEN_DEPTH/2, 0.94, KZ1 + 0.20, building);
for (let i = 0; i < 2; i++) {
  const cm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.075, 0.075, 0.005, 24),
    new THREE.MeshStandardMaterial({color:0x333, roughness:0.6})
  );
  cm.position.set(KX1 + KITCHEN_DEPTH/2, 0.945, KZ1 + 0.10 + i*0.20);
  building.add(cm);
}
// 싱크 (앞쪽)
box(0.45, 0.10, 0.34, blackMat,
    KX1 + KITCHEN_DEPTH/2, 0.86, KZ1 + 0.85, building);
{
  const f = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.020, 0.22, 12), metalMat);
  f.position.set(KX1 + KITCHEN_DEPTH - 0.10, 1.04, KZ1 + 0.85);
  building.add(f);
}
// 세탁기 (인덕션 아래 빌트인)
box(0.55, 0.83, 0.55, cabinetGlossMat,
    KX1 + KITCHEN_DEPTH/2, 0.42, KZ1 + 0.30, building);
{
  const drum = new THREE.Mesh(
    new THREE.CircleGeometry(0.16, 32),
    new THREE.MeshPhysicalMaterial({color:0x222, transmission:0.3, roughness:0.1, transparent:true, opacity:0.7})
  );
  drum.position.set(KX1 + KITCHEN_DEPTH + 0.001, 0.42, KZ1 + 0.30);
  drum.rotation.y = Math.PI/2;
  building.add(drum);
}
// 상부장
box(KITCHEN_DEPTH, 0.60, KZ2 - KZ1, cabinetGlossMat,
    KX1 + KITCHEN_DEPTH/2, H1 - 0.32, (KZ1+KZ2)/2, building);
for (let i = 1; i < 3; i++) {
  const z = KZ1 + (KZ2 - KZ1) * i / 3;
  box(KITCHEN_DEPTH + 0.01, 0.58, 0.012, seamMat,
      KX1 + KITCHEN_DEPTH/2 + 0.001, H1 - 0.32, z, building);
}

// ====== 옷장 (좌측 긴벽, 부엌 남쪽) ======
function wardrobe(x1, x2, z1, z2, h, openSide) {
  box(x2 - x1, h, z2 - z1, cabinetGlossMat,
      (x1+x2)/2, h/2 + 0.02, (z1+z2)/2, building);
  const len = z2 - z1;
  const n = Math.max(2, Math.round(len / 0.55));
  for (let i = 1; i < n; i++) {
    const z = z1 + len * i / n;
    box((x2-x1) + 0.01, h - 0.06, 0.012, seamMat,
        (x1+x2)/2 + 0.001, (h-0.06)/2 + 0.05, z, building);
  }
  for (let i = 0; i < n; i++) {
    const z = z1 + len * (i + 0.5) / n;
    if (openSide === 'east')
      box(0.005, 0.40, 0.012, metalMat, x2 + 0.003, 0.95, z, building);
  }
}
wardrobe(WDL_X1, WDL_X2, WDL_Z1, WDL_Z2, H1 - 0.04, 'east');

// ====== 계단 (좌→우 ascending, 욕실 남측 벽 z=BZ2 따라) ======
const stairsGroup = new THREE.Group();
building.add(stairsGroup);

for (let i = 0; i < N_STEPS; i++) {
  const cx = STAIR_X1 + i * stepRun + stepRun/2;
  const cy = i * stepRise + stepRise/2;
  const cz = (STAIR_Z1 + STAIR_Z2)/2;
  box(stepRun * 0.95, 0.04, STAIR_W * 0.92, woodStepMat,
      cx, cy + stepRise/2, cz, stairsGroup);
}
// 흰색 사이드 스트링거 (북측 = 욕실벽쪽)
{
  const len = Math.hypot(STAIR_X2 - STAIR_X1, H1);
  const angle = Math.atan2(H1, STAIR_X2 - STAIR_X1);
  const panel = new THREE.Mesh(new THREE.BoxGeometry(len, 0.40, 0.025), stairSideMat);
  panel.position.set((STAIR_X1+STAIR_X2)/2, H1/2 + 0.05, STAIR_Z1 + 0.02);
  panel.rotation.z = angle;
  stairsGroup.add(panel);
}
// 핸드레일 (얇은 금속 봉, 남측 = 거실쪽)
{
  const len = Math.hypot(STAIR_X2 - STAIR_X1, H1);
  const angle = Math.atan2(H1, STAIR_X2 - STAIR_X1);
  const rail = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, len, 8), metalMat);
  rail.position.set((STAIR_X1+STAIR_X2)/2, H1/2 + 0.95, STAIR_Z2 - 0.02);
  rail.rotation.z = angle - Math.PI/2;
  stairsGroup.add(rail);
}
// 핸드레일 수직 지지봉
for (let i = 0; i <= N_STEPS; i += 3) {
  const cx = STAIR_X1 + i * stepRun;
  const cy = i * stepRise;
  if (cy < H1 - 0.05)
    box(0.012, H1 - cy, 0.012, metalMat, cx, (cy + H1)/2, STAIR_Z2 - 0.02, stairsGroup);
}

// ====== 복층 ======
const loftGroup = new THREE.Group();
building.add(loftGroup);

// 복층 바닥 (z=0 ~ LOFT_Z2)
box(W, SLAB, LOFT_Z2, woodStepMat,
    W/2, H1 + SLAB/2, LOFT_Z2/2, loftGroup);

// 복층 정면 (z=LOFT_Z2): 그리드 오픈 수납 (난간)
const SHELF_Y0 = LOFT_Y;
const SHELF_H = 0.85;
const VCOLS = 5, HROWS = 3;
for (let j = 0; j <= HROWS; j++) {
  const y = SHELF_Y0 + SHELF_H * j / HROWS;
  box(W, 0.025, 0.30, railMat, W/2, y, LOFT_Z2 - 0.15, loftGroup);
}
for (let i = 0; i <= VCOLS; i++) {
  const x = W * i / VCOLS;
  box(0.02, SHELF_H, 0.30, railMat, x, SHELF_Y0 + SHELF_H/2, LOFT_Z2 - 0.15, loftGroup);
}

// 복층 부엌 위 그리드 책장 (사진 reference)
const SH2_X1 = 0.0, SH2_X2 = KITCHEN_DEPTH + 0.30;
const SH2_Z1 = KZ1 - 0.20, SH2_Z2 = KZ2 + 0.20;
const SH2_Y1 = LOFT_Y + 0.02, SH2_Y2 = TH - 0.05;
for (let i = 0; i <= 3; i++) {
  const x = SH2_X1 + (SH2_X2 - SH2_X1) * i / 3;
  box(0.018, SH2_Y2 - SH2_Y1, SH2_Z2 - SH2_Z1, railMat,
      x, (SH2_Y1+SH2_Y2)/2, (SH2_Z1+SH2_Z2)/2, loftGroup);
}
for (let j = 0; j <= 2; j++) {
  const y = SH2_Y1 + (SH2_Y2 - SH2_Y1) * j / 2;
  box(SH2_X2 - SH2_X1, 0.018, SH2_Z2 - SH2_Z1, railMat,
      (SH2_X1+SH2_X2)/2, y, (SH2_Z1+SH2_Z2)/2, loftGroup);
}

// ====== AC (좌측 벽 윗쪽, 창쪽) — 벽걸이 분리형 ======
box(0.85, 0.28, 0.22, acMat,
    0.12, H1 - 0.22, L - 0.55, building);
box(0.78, 0.04, 0.005, blackMat, 0.12, H1 - 0.10, L - 0.55 + 0.10, building);

// ====== 월패드 (현관 알코브 안쪽 동측) ======
box(0.025, 0.18, 0.13, wallpadMat,
    ED_X2 + 0.10, 1.50, 0.04 + WALL_THK/2, building);
box(0.005, 0.14, 0.10, glassMat,
    ED_X2 + 0.114, 1.50, 0.04 + WALL_THK/2, building);

// 신발
box(0.20, 0.05, 0.10, blackMat, ED_X1 + 0.25, 0.045, 0.20, building);
box(0.20, 0.05, 0.10, blackMat, ED_X1 + 0.55, 0.045, 0.20, building);

// ====== 자동 벽/천장 숨김 ======
let autoHide = true;
function updateAutoHide() {
  if (!autoHide) {
    ext.west.visible = ext.east.visible = ext.south.visible = ext.north.visible = true;
    ceilingGroup.visible = true;
    return;
  }
  const cam = camera.position;
  ext.west.visible  = !(cam.x < 0);
  ext.east.visible  = !(cam.x > W);
  ext.north.visible = !(cam.z < 0);
  ext.south.visible = !(cam.z > L);
  ceilingGroup.visible = !(cam.y > TH);
}

// ====== Views ======
function setView(name) {
  const t = new THREE.Vector3(W/2, 1.0, L/2);
  let p;
  if (name === 'top') {
    p = new THREE.Vector3(W/2 + 0.01, 14, L/2);
  } else if (name === 'front') {
    p = new THREE.Vector3(W/2, 1.6, L + 6);
    t.set(W/2, 1.4, L/2);
  } else if (name === 'back') {
    p = new THREE.Vector3(W/2, 1.6, -6);
    t.set(W/2, 1.4, L/2);
  } else if (name === 'inside') {
    p = new THREE.Vector3(W/2 + 0.3, 1.4, L - 0.5);
    t.set(W/2, 1.4, 0.5);
  } else { // iso
    p = new THREE.Vector3(W + 5, 6.0, L + 5);
  }
  animateCamera(camera.position.clone(), p, controls.target.clone(), t, 600);
}
function animateCamera(p0, p1, t0, t1, ms) {
  const start = performance.now();
  function step(now) {
    const k = Math.min(1, (now - start)/ms);
    const e = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
    camera.position.lerpVectors(p0, p1, e);
    controls.target.lerpVectors(t0, t1, e);
    controls.update();
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
window.setView = setView;

window.toggleAutoHide = function() {
  autoHide = !autoHide;
  const b = document.getElementById('btnAutoHide');
  b.textContent = autoHide ? '벽 자동숨김 ON' : '벽 자동숨김 OFF';
  b.classList.toggle('active', autoHide);
};
let loftVisible = true;
window.toggleLoft = function() {
  loftVisible = !loftVisible;
  loftGroup.visible = loftVisible;
  const b = document.getElementById('btnLoft');
  b.textContent = loftVisible ? '복층 ON' : '복층 OFF';
  b.classList.toggle('active', loftVisible);
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setView('iso');

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateAutoHide();
  renderer.render(scene, camera);
}
animate();
</script>
</body>

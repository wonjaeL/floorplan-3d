<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>복층 원룸 3D 뷰어</title>
<style>
  body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #b0d0e8; }
  #info {
    position: absolute; top: 12px; left: 12px; color: white;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; z-index: 10; line-height: 1.55;
    backdrop-filter: blur(6px); max-width: 320px;
  }
  #controls {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.55); padding: 10px; border-radius: 8px;
    z-index: 10; backdrop-filter: blur(6px);
  }
  button {
    background: #555; color: white; border: 1px solid #777;
    padding: 6px 12px; margin: 2px; border-radius: 5px; cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #777; }
  button.active { background: #2a7; border-color: #4d9; }
  small { opacity: .7; }
</style>
</head>
<body>
<div id="info">
  <strong>복층 원룸 3D</strong> (빈집)<br>
  <small>2.4 × 4.1 m · 1F 3.0m + Loft 0.9m</small><br>
  좌클릭 + 드래그 : 회전<br>
  마우스 휠 : 확대/축소<br>
  우클릭 + 드래그 : 이동<br>
  <small>※ 시야 쪽 외벽/천장은 자동으로 숨겨집니다</small>
</div>
<div id="controls">
  <button onclick="setView('iso')">아이소</button>
  <button onclick="setView('top')">위에서</button>
  <button onclick="setView('side')">측면</button>
  <button onclick="setView('inside')">실내</button>
  <button id="btnAutoHide" class="active" onclick="toggleAutoHide()">벽 자동숨김 ON</button>
  <button id="btnLoft" class="active" onclick="toggleLoft()">복층 ON</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ====== Dimensions (m) ======
const W = 2.4;
const L = 4.1;
const H1 = 3.0;
const SLAB = 0.1;
const H_LOFT = 0.9;
const TH = H1 + SLAB + H_LOFT;
const WALL_THK = 0.1;
const BATH_H = 2.0;
const STAIR_W = 0.4;

// ====== Layout ======
// X axis = 폭(좁은쪽), Z axis = 길이(긴쪽). Z=0 = 현관쪽 외벽, Z=L = 창문쪽
// Bathroom: 한쪽 코너 (X=0~1.4, Z=0~2.2)
const BX1=0.0, BX2=1.4, BZ1=0.0, BZ2=2.2;
// Entrance shoe area 1×1m (욕실 옆 코너)
const EX1=BX2, EX2=W,  EZ1=0.0, EZ2=1.0;
// Hall (현관 안쪽, 욕실 옆 통로)
const HX1=BX2, HX2=W,  HZ1=EZ2, HZ2=BZ2;
// Kitchen + Wardrobe column on X=0 (부엌+옷장 = 한쪽 긴 벽 따라 일자)
const K_X = 0.6;          // 부엌/옷장 깊이
const KZ1=BZ2, KZ2=BZ2 + 1.4;          // 부엌 1.4m
const WDZ1=KZ2, WDZ2=L;                // 옷장은 부엌 끝~창쪽 끝
// Stairs (부엌 끝쯤에서 시작 → 부엌 위 복층으로)
// 진행 방향 = X (현관쪽에서 부엌쪽으로), 폭 = Z 방향 0.4m
const STAIR_Z1 = HZ2 + 0.0;            // 욕실/통로 끝에서 시작 (Z=2.2)
const STAIR_Z2 = STAIR_Z1 + STAIR_W;   // Z=2.6
const STAIR_X_FROM = W;                // X=W쪽에서 시작
const STAIR_X_TO = K_X;                // 부엌 끝까지
const STAIR_LEN_X = STAIR_X_FROM - STAIR_X_TO;
// Loft (부엌+욕실 위)
const LOFT_X1 = 0;
const LOFT_X2 = K_X + 0.4;             // 부엌 폭 + 약간
const LOFT_Z2 = STAIR_Z2;              // 계단 끝까지

// ====== Scene ======
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc8dcee);
scene.fog = new THREE.Fog(0xc8dcee, 30, 80);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.3;
controls.maxDistance = 30;
controls.target.set(W/2, 1.2, L/2);

// ====== Lights ======
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff2dc, 1.4);
sun.position.set(-12, 16, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -15;
sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;
sun.shadow.camera.bottom = -15;
sun.shadow.bias = -0.0005;
scene.add(sun);

const indoor = new THREE.PointLight(0xfff0d8, 0.8, 7);
indoor.position.set(W/2, H1 - 0.15, 3.0);
scene.add(indoor);
const indoorBath = new THREE.PointLight(0xfff0d8, 0.3, 3);
indoorBath.position.set(BX2/2, BATH_H - 0.1, BZ2/2);
scene.add(indoorBath);

// ====== Materials ======
const wallMat       = new THREE.MeshStandardMaterial({ color: 0xf6f3ec, roughness: 0.95, side: THREE.DoubleSide });
const wallExtMat    = new THREE.MeshStandardMaterial({ color: 0xe5e0d4, roughness: 0.95, side: THREE.DoubleSide });
const ceilingMat    = new THREE.MeshStandardMaterial({ color: 0xeae6dc, roughness: 0.95 });
const floorMat      = new THREE.MeshStandardMaterial({ color: 0xd9c39a, roughness: 0.55 });
const floorBathMat  = new THREE.MeshStandardMaterial({ color: 0x4a3a32, roughness: 0.5 });
const floorEntryMat = new THREE.MeshStandardMaterial({ color: 0x6d6155, roughness: 0.7 });
const cabinetMat    = new THREE.MeshStandardMaterial({ color: 0xf2eddf, roughness: 0.4 });
const cabinetGlossMat = new THREE.MeshStandardMaterial({ color: 0xfaf6ea, roughness: 0.2, metalness: 0.05 });
const counterMat    = new THREE.MeshStandardMaterial({ color: 0xf5f4ee, roughness: 0.3 });
const woodStepMat   = new THREE.MeshStandardMaterial({ color: 0xa4753f, roughness: 0.6 });
const railMat       = new THREE.MeshStandardMaterial({ color: 0xfafaf6, roughness: 0.5 });
const metalMat      = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.35, metalness: 0.6 });
const blackMat      = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4 });
const doorMat       = new THREE.MeshStandardMaterial({ color: 0xd5cab2, roughness: 0.55 });
const doorBathMat   = new THREE.MeshStandardMaterial({ color: 0xeeeae0, roughness: 0.5 });
const acMat         = new THREE.MeshStandardMaterial({ color: 0xeeece5, roughness: 0.55 });
const wallpadMat    = new THREE.MeshStandardMaterial({ color: 0x222, roughness: 0.4 });
const glassMat      = new THREE.MeshPhysicalMaterial({
  color: 0xb8d2e6, transmission: 0.85, opacity: 0.35, transparent: true,
  roughness: 0.05, thickness: 0.05, side: THREE.DoubleSide
});

function box(w, h, d, mat, x, y, z, parent=scene) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  m.receiveShadow = true;
  parent.add(m);
  return m;
}

// ====== Ground ======
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x6a8761, roughness: 1 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.06;
ground.receiveShadow = true;
scene.add(ground);

// ====== Building root ======
const building = new THREE.Group();
scene.add(building);

// 1F floor — 신발존 영역 빼고 두 조각
// 1) X=0~EX1, Z=0~L (욕실/부엌/옷장 라인 아래 floor)
box(EX1, 0.04, L, floorMat, EX1/2, 0.02, L/2, building);
// 2) X=EX1~W, Z=EZ2~L (현관 신발존 위쪽)
box(W - EX1, 0.04, L - EZ2, floorMat, (EX1+W)/2, 0.02, (EZ2+L)/2, building);
// 신발존 (낮은 floor)
box(EX2 - EX1, 0.04, EZ2 - EZ1, floorEntryMat,
    (EX1+EX2)/2, -0.02, (EZ1+EZ2)/2, building);
// 현관 턱
box(EX2 - EX1, 0.025, 0.04, woodStepMat,
    (EX1+EX2)/2, 0.0125, EZ2 - 0.02, building);

// ====== External walls (4 sides), grouped ======
const ext = {
  west:  new THREE.Group(),
  east:  new THREE.Group(),
  south: new THREE.Group(),
  north: new THREE.Group()
};
for (const g of Object.values(ext)) building.add(g);

// West (X=0): solid (kitchen/wardrobe 뒷벽)
box(WALL_THK, TH, L + 2*WALL_THK, wallExtMat, -WALL_THK/2, TH/2, L/2, ext.west);
// East (X=W): solid (빈벽 / 에어컨)
box(WALL_THK, TH, L + 2*WALL_THK, wallExtMat, W + WALL_THK/2, TH/2, L/2, ext.east);

// South (Z=0): 현관문 cutout (X=EX1~EX2, height 0~2.0)
// 좌측 (욕실 외벽쪽)
box(EX1 + WALL_THK, TH, WALL_THK, wallExtMat,
    (EX1 - WALL_THK)/2, TH/2, -WALL_THK/2, ext.south);
// 우측
box(W - EX2 + WALL_THK, TH, WALL_THK, wallExtMat,
    (EX2 + W + WALL_THK)/2, TH/2, -WALL_THK/2, ext.south);
// header
box(EX2 - EX1, TH - 2.0, WALL_THK, wallExtMat,
    (EX1+EX2)/2, (2.0 + TH)/2, -WALL_THK/2, ext.south);
// 현관문
box(EX2 - EX1 - 0.05, 1.95, 0.04, doorMat,
    (EX1+EX2)/2, 0.975, -WALL_THK/2 - 0.025, ext.south);
// 도어록
{
  const lock = box(0.07, 0.18, 0.025, blackMat,
                   EX1 + 0.18, 1.1, -WALL_THK/2 - 0.05, ext.south);
}

// North (Z=L): 창문 (X=0.4~2.0, height 0.9~2.6)
box(W + 2*WALL_THK, TH - 2.6, WALL_THK, wallExtMat,
    W/2, (2.6 + TH)/2, L + WALL_THK/2, ext.north);
box(W + 2*WALL_THK, 0.9, WALL_THK, wallExtMat,
    W/2, 0.45, L + WALL_THK/2, ext.north);
box(0.4 + WALL_THK, 1.7, WALL_THK, wallExtMat,
    (0.4 - WALL_THK)/2, 1.75, L + WALL_THK/2, ext.north);
box(W + WALL_THK - 2.0, 1.7, WALL_THK, wallExtMat,
    (2.0 + W + WALL_THK)/2, 1.75, L + WALL_THK/2, ext.north);
box(1.6, 1.7, 0.04, glassMat, 1.2, 1.75, L + WALL_THK/2, ext.north);
const mull = new THREE.MeshStandardMaterial({ color: 0xe0dccf, roughness: 0.5 });
box(0.04, 1.72, 0.02, mull, 1.2, 1.75, L + WALL_THK/2, ext.north);
box(1.62, 0.04, 0.02, mull, 1.2, 1.75, L + WALL_THK/2, ext.north);

// 천장
const ceilingGroup = new THREE.Group();
building.add(ceilingGroup);
box(W, 0.05, L, ceilingMat, W/2, TH - 0.025, L/2, ceilingGroup);

// ====== 욕실 내부 ======
// East wall (X=BX2): 도어 cutout (Z=BZ2-0.85 ~ BZ2-0.05)
const BD_Z1 = BZ2 - 0.85;
const BD_Z2 = BZ2 - 0.05;
// East wall: 두 조각 (도어 위/아래는 도어 자체로)
// 도어 좌측 (Z=0~BD_Z1)
box(WALL_THK, BATH_H, BD_Z1, wallMat, BX2, BATH_H/2, BD_Z1/2, building);
// 도어 우측 (Z=BD_Z2~BZ2)
box(WALL_THK, BATH_H, BZ2 - BD_Z2, wallMat, BX2, BATH_H/2, (BD_Z2 + BZ2)/2, building);
// 도어 위 header (Z=BD_Z1~BD_Z2, y=2.0~BATH_H)
// (BATH_H = 2.0이면 header 두께 0이라 생략)
// 욕실 도어 (반투명/흰)
box(0.04, 1.95, BD_Z2 - BD_Z1 - 0.05, doorBathMat,
    BX2 + 0.025, 0.975, (BD_Z1 + BD_Z2)/2, building);

// 욕실 north wall (Z=BZ2)
box(BX2, BATH_H, WALL_THK, wallMat, BX2/2, BATH_H/2, BZ2, building);
// 욕실 floor (다크 타일)
box(BX2, 0.02, BZ2, floorBathMat, BX2/2, 0.05, BZ2/2, building);
// 욕실 천장
box(BX2, 0.05, BZ2, ceilingMat, BX2/2, BATH_H, BZ2/2, building);

// 욕실 비품 (빌트인만)
// 변기 (안쪽 코너 — 도어 우측쪽)
box(0.36, 0.4, 0.55, counterMat, BX2 - 0.25, 0.25, BZ2 - 0.4, building);
box(0.4, 0.6, 0.18, counterMat, BX2 - 0.25, 0.5, BZ2 - 0.18, building);
// 세면대 (현관쪽 벽)
box(0.5, 0.06, 0.4, counterMat, BX2 - 0.3, 0.85, 0.4, building);
box(0.5, 0.85, 0.4, cabinetMat, BX2 - 0.3, 0.42, 0.4, building);
// 거울 캐비닛
box(0.5, 0.6, 0.05, glassMat, BX2 - 0.3, 1.55, 0.05, building);
box(0.55, 0.65, 0.06, cabinetMat, BX2 - 0.3, 1.55, 0.04, building);
// 샤워 (안쪽 좌측 코너)
box(0.7, BATH_H, 0.04, glassMat, 0.35, BATH_H/2, BZ2 - 0.7, building);
box(0.04, BATH_H, 0.7, glassMat, 0.7, BATH_H/2, BZ2 - 0.35, building);

// ====== 부엌 (X=0~K_X, Z=KZ1~KZ2) ======
// 하부장
box(K_X, 0.85, KZ2 - KZ1, cabinetGlossMat,
    K_X/2, 0.45, (KZ1+KZ2)/2, building);
// 카운터
box(K_X + 0.04, 0.04, KZ2 - KZ1 + 0.02, counterMat,
    K_X/2 + 0.02, 0.91, (KZ1+KZ2)/2, building);
// 인덕션
box(0.4, 0.025, 0.5, blackMat, K_X/2, 0.94, KZ1 + 0.3, building);
for (let i = 0; i < 2; i++) {
  const cm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 0.005, 24),
    new THREE.MeshStandardMaterial({color:0x333, roughness:0.6})
  );
  cm.position.set(K_X/2, 0.945, KZ1 + 0.18 + i*0.24);
  building.add(cm);
}
// 싱크
box(0.5, 0.1, 0.35, blackMat, K_X/2, 0.86, KZ1 + 0.85, building);
// 수전
{
  const f = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.025, 0.25, 12), metalMat);
  f.position.set(K_X/2 + 0.1, 1.04, KZ1 + 0.85);
  building.add(f);
}
// 세탁기 (인덕션 아래쪽 빌트인 — 인덕션쪽 끝)
box(0.55, 0.83, 0.55, cabinetMat, K_X/2, 0.42, KZ1 + 0.3, building);
{
  const drum = new THREE.Mesh(
    new THREE.CircleGeometry(0.16, 32),
    new THREE.MeshPhysicalMaterial({color:0x222, transmission:0.3, roughness:0.1, transparent:true, opacity:0.7})
  );
  drum.position.set(K_X + 0.001, 0.42, KZ1 + 0.3);
  drum.rotation.y = Math.PI/2;
  building.add(drum);
}
// 상부장
box(K_X, 0.6, KZ2 - KZ1 - 0.2, cabinetGlossMat,
    K_X/2, H1 - 0.85, (KZ1+KZ2)/2, building);

// ====== 옷장 (빌트인, X=0~K_X, Z=KZ2~L) ======
// 천장까지 닿는 큰 빌트인 옷장
box(K_X, H1 - 0.04, WDZ2 - WDZ1, cabinetMat,
    K_X/2, (H1 - 0.04)/2 + 0.04, (WDZ1+WDZ2)/2, building);
// 도어 분할선 (얇은 홈)
const seamMat = new THREE.MeshStandardMaterial({ color: 0xc8c0aa, roughness: 0.6 });
for (let i = 1; i < 3; i++) {
  const z = WDZ1 + (WDZ2 - WDZ1) * i / 3;
  box(K_X + 0.005, H1 - 0.1, 0.012, seamMat,
      K_X/2 + 0.001, (H1 - 0.1)/2 + 0.05, z, building);
}
// 손잡이 (수직 슬릿)
for (let i = 0; i < 3; i++) {
  const z = WDZ1 + (WDZ2 - WDZ1) * (i + 0.5) / 3;
  box(0.005, 0.4, 0.012, metalMat, K_X + 0.003, 0.9, z, building);
}

// ====== 현관 / 월패드 ======
// 월패드 (현관문 안쪽 — 짧은 벽 인근에 있는 사용자 쪽 벽)
// 평면적으로 욕실 east 외벽 = X=BX2 → 월패드는 욕실 외벽쪽 (X=BX2 약간 전)
// 사용자 사진: 월패드는 현관문 옆 짧은 통로 끝 흰벽 (== 욕실 east 벽 위)
box(0.16, 0.22, 0.025, wallpadMat,
    BX2 - 0.1, 1.5, EZ2 + 0.05, building);
// 화면
box(0.13, 0.18, 0.005, glassMat,
    BX2 - 0.1, 1.5, EZ2 + 0.04, building);

// ====== 에어컨 (천장형, 우측 긴 벽 위쪽) ======
box(0.85, 0.28, 0.32, acMat, W - 0.18, H1 - 0.18, L - 0.4, building);

// ====== 계단 (가파른, X 진행) ======
const stairsGroup = new THREE.Group();
building.add(stairsGroup);

const N_STEPS = 12;
const stepRise = (H1 + SLAB) / N_STEPS;
const stepRun = STAIR_LEN_X / N_STEPS;
for (let i = 0; i < N_STEPS; i++) {
  // X: 시작 W → 부엌끝 STAIR_X_TO. 위로 갈수록 X 작아짐.
  const cx = STAIR_X_FROM - i * stepRun - stepRun/2;
  const cy = i * stepRise + stepRise/2;
  const cz = (STAIR_Z1 + STAIR_Z2)/2;
  // 디딤판: X stepRun 만큼, Z STAIR_W
  box(stepRun * 0.95, 0.04, STAIR_W, woodStepMat, cx, cy + stepRise/2, cz, stairsGroup);
}
// 측면 (Z=STAIR_Z2 쪽, 거실쪽 open side에 흰 패널)
{
  const len = Math.hypot(STAIR_LEN_X, H1 + SLAB);
  const angle = Math.atan2(H1 + SLAB, STAIR_LEN_X);
  const panel = new THREE.Mesh(new THREE.BoxGeometry(len, 0.4, 0.025), railMat);
  panel.position.set((STAIR_X_FROM + STAIR_X_TO)/2, (H1 + SLAB)/2, STAIR_Z2 - 0.01);
  panel.rotation.y = 0;
  panel.rotation.z = angle;
  panel.castShadow = true;
  stairsGroup.add(panel);

  const handrail = new THREE.Mesh(new THREE.BoxGeometry(len, 0.04, 0.04), railMat);
  handrail.position.set((STAIR_X_FROM + STAIR_X_TO)/2 + 0.05*Math.sin(angle),
                        (H1 + SLAB)/2 + 0.85*Math.cos(angle),
                        STAIR_Z2 - 0.02);
  handrail.rotation.z = angle;
  stairsGroup.add(handrail);
}
// 수직 봉 (open side)
for (let i = 1; i < N_STEPS; i += 3) {
  const cx = STAIR_X_FROM - i * stepRun;
  const cy = i * stepRise;
  box(0.025, 0.85, 0.025, railMat, cx, cy + 0.425, STAIR_Z2 - 0.02, stairsGroup);
}

// ====== 복층 ======
const loftGroup = new THREE.Group();
building.add(loftGroup);

// 복층 바닥 (부엌+욕실 위 + 계단 위)
box(LOFT_X2, SLAB, LOFT_Z2, woodStepMat,
    LOFT_X2/2, H1 + SLAB/2, LOFT_Z2/2, loftGroup);

// 복층 난간 (개방 변)
const railH = 0.85;
// East edge of loft (X=LOFT_X2): 거실쪽 개방
for (let z = 0.12; z <= LOFT_Z2 - 0.1; z += 0.2) {
  box(0.025, railH, 0.025, railMat, LOFT_X2, H1 + SLAB + railH/2, z, loftGroup);
}
box(0.04, 0.04, LOFT_Z2, railMat, LOFT_X2, H1 + SLAB + railH, LOFT_Z2/2, loftGroup);
box(0.04, 0.04, LOFT_Z2, railMat, LOFT_X2, H1 + SLAB + 0.08, LOFT_Z2/2, loftGroup);
// Front edge (Z=LOFT_Z2): 거실쪽 개방
for (let x = 0.12; x <= LOFT_X2 - 0.1; x += 0.2) {
  box(0.025, railH, 0.025, railMat, x, H1 + SLAB + railH/2, LOFT_Z2, loftGroup);
}
box(LOFT_X2, 0.04, 0.04, railMat, LOFT_X2/2, H1 + SLAB + railH, LOFT_Z2, loftGroup);
box(LOFT_X2, 0.04, 0.04, railMat, LOFT_X2/2, H1 + SLAB + 0.08, LOFT_Z2, loftGroup);

// 복층 격자 수납 (부엌 위, 천장까지)
const SHELF_X1 = 0.0, SHELF_X2 = K_X;
const SHELF_Y1 = H1 + SLAB + 0.0;
const SHELF_Y2 = TH - 0.05;
const SHELF_Z1 = KZ1, SHELF_Z2 = KZ2;
for (let i = 0; i <= 3; i++) {
  const x = SHELF_X1 + (SHELF_X2 - SHELF_X1) * i / 3;
  box(0.02, SHELF_Y2 - SHELF_Y1, SHELF_Z2 - SHELF_Z1, railMat,
      x, (SHELF_Y1+SHELF_Y2)/2, (SHELF_Z1+SHELF_Z2)/2, loftGroup);
}
for (let j = 0; j <= 3; j++) {
  const y = SHELF_Y1 + (SHELF_Y2 - SHELF_Y1) * j / 3;
  box(SHELF_X2 - SHELF_X1, 0.02, SHELF_Z2 - SHELF_Z1, railMat,
      (SHELF_X1+SHELF_X2)/2, y, (SHELF_Z1+SHELF_Z2)/2, loftGroup);
}

// ====== 자동 벽/천장 숨김 ======
let autoHide = true;
function updateAutoHide() {
  if (!autoHide) {
    ext.west.visible = ext.east.visible = ext.south.visible = ext.north.visible = true;
    ceilingGroup.visible = true;
    return;
  }
  const cam = camera.position;
  ext.west.visible  = !(cam.x < 0);
  ext.east.visible  = !(cam.x > W);
  ext.south.visible = !(cam.z < 0);
  ext.north.visible = !(cam.z > L);
  ceilingGroup.visible = !(cam.y > TH);
}

// ====== Views ======
function setView(name) {
  const t = new THREE.Vector3(W/2, 1.2, L/2);
  let p;
  if (name === 'top') {
    p = new THREE.Vector3(W/2 + 0.01, 12, L/2);
  } else if (name === 'side') {
    p = new THREE.Vector3(W + 7, 2.5, L/2);
    t.set(W/2, 1.5, L/2);
  } else if (name === 'inside') {
    p = new THREE.Vector3(W/2 + 0.5, 1.5, L - 0.3);
    t.set(W/2, 1.4, 0);
  } else { // iso
    p = new THREE.Vector3(W + 4, 5.5, L + 4);
  }
  animateCamera(camera.position.clone(), p, controls.target.clone(), t, 600);
}
function animateCamera(p0, p1, t0, t1, ms) {
  const start = performance.now();
  function step(now) {
    const k = Math.min(1, (now - start)/ms);
    const e = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
    camera.position.lerpVectors(p0, p1, e);
    controls.target.lerpVectors(t0, t1, e);
    controls.update();
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
window.setView = setView;

window.toggleAutoHide = function() {
  autoHide = !autoHide;
  const b = document.getElementById('btnAutoHide');
  b.textContent = autoHide ? '벽 자동숨김 ON' : '벽 자동숨김 OFF';
  b.classList.toggle('active', autoHide);
};
let loftVisible = true;
window.toggleLoft = function() {
  loftVisible = !loftVisible;
  loftGroup.visible = loftVisible;
  const b = document.getElementById('btnLoft');
  b.textContent = loftVisible ? '복층 ON' : '복층 OFF';
  b.classList.toggle('active', loftVisible);
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setView('iso');

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateAutoHide();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
